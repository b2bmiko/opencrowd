apiVersion: v1
kind: Service
metadata:
  name: opencrowd-frontend
  labels:
    {{- include "opencrowd.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: opencrowd-frontend
