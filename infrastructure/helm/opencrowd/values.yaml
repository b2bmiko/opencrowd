# Default values for OpenCrowd Helm chart

# Backend
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/b2bmiko/opencrowd-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  env:
    SPRING_PROFILES_ACTIVE: prod
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/opencrowd
    SPRING_DATASOURCE_USERNAME: opencrowd
    SPRING_REDIS_HOST: redis
    SPRING_REDIS_PORT: "6379"

# Frontend
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/b2bmiko/opencrowd-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.opencrowd.io
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
        - path: /swagger-ui
          pathType: Prefix
          service: backend
  tls:
    - secretName: opencrowd-tls
      hosts:
        - app.opencrowd.io

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# External dependencies (assumes these are deployed separately)
postgresql:
  host: postgresql
  port: 5432
  database: opencrowd
  username: opencrowd
  existingSecret: opencrowd-db-credentials
  secretKey: password

redis:
  host: redis
  port: 6379

keycloak:
  url: https://auth.opencrowd.io
  realm: opencrowd
