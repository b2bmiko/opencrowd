version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: opencrowd-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: opencrowd
      POSTGRES_USER: opencrowd
      POSTGRES_PASSWORD: opencrowd_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencrowd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    container_name: opencrowd-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    container_name: opencrowd-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opencrowd
      SPRING_DATASOURCE_USERNAME: opencrowd
      SPRING_DATASOURCE_PASSWORD: opencrowd_dev
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/opencrowd
      OPENCROWD_CORS_ORIGINS: http://localhost:3000,http://dev.opencrowd.io:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: opencrowd-keycloak
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/opencrowd
      KC_DB_USERNAME: opencrowd
      KC_DB_PASSWORD: opencrowd_dev
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres_data:
